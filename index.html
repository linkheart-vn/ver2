<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkHeart - Emergency AI Assistant</title>
    <script>
      // Early shim for process.env
      window.process = { env: { NODE_ENV: 'development' } };
      
      // Global error reporter to catch "white screen" issues
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#fee;color:#c00;padding:20px;z-index:99999;font-family:sans-serif;border-bottom:4px solid #f00;box-sizing:border-box;overflow:auto;max-height:50vh;';
        div.innerHTML = '<h3 style="margin:0 0 10px">LinkHeart Runtime Crash</h3>' + 
                        '<p style="margin:0 0 5px"><b>Error:</b> ' + msg + '</p>' +
                        '<p style="margin:0;font-size:12px">at ' + url + ':' + line + ':' + col + '</p>';
        if (error && error.stack) {
          div.innerHTML += '<pre style="font-size:10px;margin-top:10px;background:#fff;padding:10px;border:1px solid #ecc">' + error.stack + '</pre>';
        }
        document.body.appendChild(div);
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root">
      <div style="height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;background:#FFFDF9;">
        <div style="text-align:center;">
          <div style="width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #FF9F1C;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;"></div>
          <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
          <h2 style="margin:0 0 10px;color:#333;">LinkHeart is loading...</h2>
          <p style="color:#666;font-size:14px;margin:0;">Nếu màn hình không phản hồi, vui lòng làm mới trang.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
